kind: Deployment
apiVersion: apps/v1
metadata:
  name: fundfetti
  labels:
    app: fundfetti
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fundfetti
  template:
    metadata:
      name: fundfetti
      labels:
        app: fundfetti
    spec:
      containers:
        - name: fundfetti
          image: 'melvis02/fundfetti:latest'
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
---
kind: Service
apiVersion: v1
metadata:
  name: fundfetti
spec:
  selector:
    app: fundfetti
  ports:
    - name: fundfetti-port
      port: 443
      protocol: TCP
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fundfetti
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  spec:
    rules:
    - host: flowers.treympick.me
      http:
        paths:
        - backend:
            service:
              name: fundfetti
              port:
                number: 443
          path: /(.*)
          pathType: ImplementationSpecific
    tls:
    - hosts:
      - flowers.treympick.me
